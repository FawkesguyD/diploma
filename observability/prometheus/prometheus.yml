global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    project: diploma

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  # ── Prometheus itself ──────────────────────────────────────────────
  - job_name: prometheus
    static_configs:
      - targets: [localhost:9090]

  # ── Node exporter — host metrics ───────────────────────────────────
  - job_name: node
    static_configs:
      - targets: [node-exporter:9100]

  # ── cAdvisor — container metrics ──────────────────────────────────
  - job_name: cadvisor
    static_configs:
      - targets: [cadvisor:8080]
    metric_relabel_configs:
      # Keep only diploma_ containers
      - source_labels: [container_label_com_docker_compose_project]
        regex: diploma
        action: keep
      - source_labels: [container_label_com_docker_compose_service]
        target_label: service

  # ── FastAPI services — /metrics endpoint ──────────────────────────
  - job_name: realestate
    static_configs:
      - targets: [realestate:8000]
    metrics_path: /metrics

  - job_name: nlp-parser
    static_configs:
      - targets: [nlp-parser:8000]
    metrics_path: /metrics

  - job_name: metrics-svc
    static_configs:
      - targets: [metrics:8000]
    metrics_path: /metrics

  - job_name: scheduler
    static_configs:
      - targets: [scheduler:8000]
    metrics_path: /metrics
