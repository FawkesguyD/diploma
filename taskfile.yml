version: "3"

# Taskfile для корня дипломного проекта.
# Документация: https://taskfile.dev

tasks:
  default:
    desc: Показать список задач
    cmds:
      - task --list

  up:
    desc: Поднять всю инфраструктуру (docker compose up -d --build)
    cmds:
      - docker compose up -d --build

  down:
    desc: Остановить и удалить контейнеры (volumes остаются)
    cmds:
      - docker compose down

  logs:
    desc: Стрим логов всех сервисов
    cmds:
      - docker compose logs -f --tail=200

  ps:
    desc: Статус сервисов
    cmds:
      - docker compose ps

  fresh:
    desc: Полный рестарт с очисткой volume-ов (ВНИМАНИЕ — теряются данные)
    cmds:
      - docker compose down -v
      - docker compose up -d --build

  config:
    desc: Валидировать и развернуть docker-compose.yml
    cmds:
      - docker compose config

  # ---------------------------------------------------------------------------
  # ML-модель: публикация и загрузка
  #
  # Схема хранения в MinIO (bucket=models):
  #   realestate_price/v{N}/bundle.joblib  — веса модели для сервиса
  #
  # core.model_registry (Postgres) указывает, какой minio_path активен.
  # Сервис realestate скачивает bundle.joblib при старте по этому пути.
  # ---------------------------------------------------------------------------

  model:publish:
    desc: "Опубликовать обученную модель в MinIO и зарегистрировать в БД. Использование: task model:publish VERSION=v3 JOBLIB=model/ml/artifacts/best_model_russia2021.joblib"
    vars:
      VERSION: '{{.VERSION | default "v2"}}'
      JOBLIB: '{{.JOBLIB | default "model/ml/artifacts/best_model_russia2021.joblib"}}'
      MINIO_PATH: "realestate_price/{{.VERSION}}/bundle.joblib"
    cmds:
      - |
        set -e
        if [ ! -f "{{.JOBLIB}}" ]; then
          echo "Ошибка: файл не найден: {{.JOBLIB}}" && exit 1
        fi
        mc alias set local http://localhost:${MINIO_PORT:-9100} ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD} --quiet
        mc cp "{{.JOBLIB}}" "local/${MINIO_BUCKET:-models}/{{.MINIO_PATH}}"
        echo "Загружено: {{.MINIO_PATH}}"
        docker compose exec -T postgres psql -U ${POSTGRES_USER:-diploma} -d ${POSTGRES_DB:-diploma} -c \
          "INSERT INTO core.model_registry (task, version, minio_path, is_active)
           VALUES ('realestate_price', '{{.VERSION}}', '{{.MINIO_PATH}}', true)
           ON CONFLICT (task, version) DO UPDATE SET minio_path = EXCLUDED.minio_path, is_active = true;
           UPDATE core.model_registry SET is_active = false
           WHERE task = 'realestate_price' AND version != '{{.VERSION}}';"
        echo "Зарегистрировано в core.model_registry, версия {{.VERSION}} активна"
        echo "Перезапустите сервис: docker compose restart realestate"

  model:pull:
    desc: "Скачать активную модель из MinIO в model/ml/artifacts/ (для локальной отладки)"
    cmds:
      - |
        set -e
        mc alias set local http://localhost:${MINIO_PORT:-9100} ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD} --quiet
        MINIO_PATH=$(docker compose exec -T postgres psql -U ${POSTGRES_USER:-diploma} -d ${POSTGRES_DB:-diploma} -tAq \
          -c "SELECT minio_path FROM core.model_registry WHERE task='realestate_price' AND is_active=true;")
        if [ -z "$MINIO_PATH" ]; then
          echo "Нет активной модели в core.model_registry" && exit 1
        fi
        mkdir -p model/ml/artifacts
        mc cp "local/${MINIO_BUCKET:-models}/$MINIO_PATH" model/ml/artifacts/best_model_russia2021.joblib
        echo "Скачано: $MINIO_PATH → model/ml/artifacts/best_model_russia2021.joblib"

  psql:
    desc: psql в postgres-контейнер
    cmds:
      - docker compose exec postgres psql -U ${POSTGRES_USER:-diploma} -d ${POSTGRES_DB:-diploma}

  mongo:
    desc: mongosh в mongo-контейнер
    cmds:
      - docker compose exec mongo mongosh -u ${MONGO_INITDB_ROOT_USERNAME:-diploma} -p ${MONGO_INITDB_ROOT_PASSWORD:-diploma} --authenticationDatabase admin

  clickhouse:
    desc: clickhouse-client в clickhouse-контейнер
    cmds:
      - docker compose exec clickhouse clickhouse-client -u ${CLICKHOUSE_USER:-diploma} --password ${CLICKHOUSE_PASSWORD:-diploma} -d ${CLICKHOUSE_DB:-diploma}
