# =====================================================================
# Redis — вспомогательный слой (dedup + outbound rate-limit).
# См. ADR-0009 и docs/design/databases/redis.md.
# =====================================================================

# Сеть
bind 0.0.0.0
protected-mode yes
port 6379

# Auth
# requirepass подставляется через --requirepass CLI флаг в compose
# (чтобы не хардкодить пароль в файл и не плодить шаблоны).

# Durability
appendonly yes
appendfsync everysec
# RDB-снапшоты выключаем — AOF достаточно, меньше I/O.
save ""

# Лимиты памяти
maxmemory 256mb
maxmemory-policy allkeys-lru

# Логи
loglevel notice

# Безопасность: режем опасные команды
rename-command FLUSHALL ""
rename-command FLUSHDB ""
rename-command CONFIG ""
rename-command DEBUG ""
