openapi: 3.1.0
info:
  title: АИС — Public REST API
  version: 0.1.0
  description: |
    Контракт между SPA-фронтендом и шлюзом. Шлюз маршрутизирует запросы на бэкенд-сервисы
    (nlp-parser / realestate / metrics) по префиксу пути. Подробности маршрутизации и
    принципов — см. `README.md` рядом.

    Этот файл — **черновик-сводка** для фазы проектирования. Финальный OpenAPI
    собирается автоматически из FastAPI-приложений каждого сервиса (`/openapi.json`).

servers:
  - url: http://localhost/api
    description: Локальный compose-стенд

tags:
  - name: auth
  - name: sources
  - name: messages
  - name: objects
  - name: model-runs
  - name: jobs
  - name: subscriptions
  - name: dashboards

security:
  - bearerAuth: []

paths:
  # ─── auth ───────────────────────────────────────────────────────────────
  /auth/login:
    post:
      tags: [auth]
      security: []
      summary: Логин по email+password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401": { $ref: "#/components/responses/Unauthorized" }

  /auth/me:
    get:
      tags: [auth]
      summary: Текущий пользователь
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401": { $ref: "#/components/responses/Unauthorized" }

  # ─── sources ────────────────────────────────────────────────────────────
  /sources:
    get:
      tags: [sources]
      summary: Список источников
      parameters:
        - { name: kind,    in: query, schema: { type: string, enum: [tg, news, rss, html, realestate_site] } }
        - { name: enabled, in: query, schema: { type: boolean } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Source" }
    post:
      tags: [sources]
      summary: Создать источник (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SourceCreate" }
      responses:
        "201": { description: Created, content: { application/json: { schema: { $ref: "#/components/schemas/Source" } } } }

  /sources/{id}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    patch:
      tags: [sources]
      summary: Обновить источник (admin)
      requestBody:
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SourcePatch" }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/Source" } } } }
    delete:
      tags: [sources]
      summary: Soft-delete источника (admin)
      responses:
        "204": { description: No Content }

  /sources/{id}/parse:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    post:
      tags: [sources]
      summary: Запустить парсинг источника прямо сейчас
      responses:
        "202":
          description: Accepted
          content:
            application/json:
              schema: { $ref: "#/components/schemas/JobAccepted" }

  # ─── messages ───────────────────────────────────────────────────────────
  /messages:
    get:
      tags: [messages]
      summary: Лента сообщений с фильтрами
      parameters:
        - { name: topic,        in: query, schema: { type: string } }
        - { name: district,     in: query, schema: { type: string } }
        - { name: sentiment,    in: query, schema: { type: string, enum: [positive, neutral, negative] } }
        - { name: channel_kind, in: query, schema: { type: string, enum: [tg, news, rss, html] } }
        - { name: channel_site, in: query, schema: { type: string } }
        - { name: source_id,    in: query, schema: { type: string, format: uuid } }
        - { name: since,        in: query, schema: { type: string, format: date-time } }
        - { name: until,        in: query, schema: { type: string, format: date-time } }
        - { name: is_ad,        in: query, schema: { type: boolean } }
        - { name: cursor,       in: query, schema: { type: string } }
        - { name: limit,        in: query, schema: { type: integer, minimum: 1, maximum: 100, default: 50 } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/CursorPage"
                  - type: object
                    properties:
                      items:
                        type: array
                        items: { $ref: "#/components/schemas/MessageWithAnnotation" }

  /messages/{id}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string } }
    get:
      tags: [messages]
      summary: Детальный просмотр сообщения
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MessageWithAnnotation" }
        "404": { $ref: "#/components/responses/NotFound" }

  /messages/stream:
    get:
      tags: [messages]
      summary: SSE-поток новых сообщений
      parameters:
        - { name: topic,        in: query, schema: { type: string } }
        - { name: channel_kind, in: query, schema: { type: string } }
      responses:
        "200":
          description: text/event-stream
          content:
            text/event-stream: {}

  # ─── objects ────────────────────────────────────────────────────────────
  /objects:
    get:
      tags: [objects]
      summary: Список объектов недвижимости с фильтрами
      parameters:
        - { name: object_kind,    in: query, schema: { type: string, enum: [residential, commercial, land, parking] } }
        - { name: channel_site,   in: query, schema: { type: string } }
        - { name: district,       in: query, schema: { type: string } }
        - { name: city,           in: query, schema: { type: string } }
        - { name: rooms,          in: query, schema: { type: integer } }
        - { name: price_min,      in: query, schema: { type: number } }
        - { name: price_max,      in: query, schema: { type: number } }
        - { name: area_min,       in: query, schema: { type: number } }
        - { name: area_max,       in: query, schema: { type: number } }
        - { name: is_undervalued, in: query, schema: { type: boolean } }
        - { name: status,         in: query, schema: { type: string, enum: [active, sold, removed] } }
        - { name: sort,           in: query, schema: { type: string, example: "published_at:desc" } }
        - { name: cursor,         in: query, schema: { type: string } }
        - { name: limit,          in: query, schema: { type: integer, minimum: 1, maximum: 100, default: 50 } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/CursorPage"
                  - type: object
                    properties:
                      items:
                        type: array
                        items: { $ref: "#/components/schemas/ObjectWithEvaluation" }

  /objects/{id}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string } }
    get:
      tags: [objects]
      summary: Детальный просмотр объекта
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ObjectWithEvaluation" }
        "404": { $ref: "#/components/responses/NotFound" }

  /objects/{id}/history:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string } }
    get:
      tags: [objects]
      summary: История цены объекта
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/PricePoint" }

  /objects/top-undervalued:
    get:
      tags: [objects]
      summary: Топ недооценённых объектов
      parameters:
        - { name: city,        in: query, schema: { type: string } }
        - { name: district,    in: query, schema: { type: string } }
        - { name: object_kind, in: query, schema: { type: string } }
        - { name: limit,       in: query, schema: { type: integer, default: 20, maximum: 100 } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ObjectWithEvaluation" }

  # ─── model-runs ─────────────────────────────────────────────────────────
  /model-runs:
    get:
      tags: [model-runs]
      summary: Список запусков моделей
      parameters:
        - { name: module, in: query, schema: { type: string } }
        - { name: status, in: query, schema: { type: string, enum: [pending, running, succeeded, failed] } }
        - { name: since,  in: query, schema: { type: string, format: date-time } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ModelRun" }
    post:
      tags: [model-runs]
      summary: Запустить run вручную (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ModelRunCreate" }
      responses:
        "202":
          description: Accepted
          content:
            application/json:
              schema: { $ref: "#/components/schemas/JobAccepted" }

  /model-runs/{id}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [model-runs]
      summary: Детали запуска
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ModelRunDetail" }

  # ─── jobs ───────────────────────────────────────────────────────────────
  /jobs/{id}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [jobs]
      summary: Статус фоновой задачи
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Job" }
        "404": { $ref: "#/components/responses/NotFound" }

  # ─── subscriptions ──────────────────────────────────────────────────────
  /subscriptions:
    get:
      tags: [subscriptions]
      summary: Подписки текущего пользователя
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Subscription" }
    post:
      tags: [subscriptions]
      summary: Создать подписку
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SubscriptionCreate" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Subscription" }

  /subscriptions/{id}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    delete:
      tags: [subscriptions]
      summary: Удалить подписку
      responses:
        "204": { description: No Content }

  # ─── dashboards ─────────────────────────────────────────────────────────
  /dashboards/topics/activity:
    get:
      tags: [dashboards]
      summary: Временной ряд активности по теме
      parameters:
        - { name: topic,       in: query, required: true, schema: { type: string } }
        - { name: since,       in: query, schema: { type: string, format: date-time } }
        - { name: until,       in: query, schema: { type: string, format: date-time } }
        - { name: granularity, in: query, schema: { type: string, enum: [hour, day], default: hour } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TimeSeries" }

  /dashboards/prices/timeseries:
    get:
      tags: [dashboards]
      summary: Динамика средней цены за м²
      parameters:
        - { name: city,        in: query, schema: { type: string } }
        - { name: district,    in: query, schema: { type: string } }
        - { name: granularity, in: query, schema: { type: string, enum: [day, week, month], default: month } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TimeSeries" }

  /dashboards/districts/activity:
    get:
      tags: [dashboards]
      summary: Активность по районам
      parameters:
        - { name: city,  in: query, schema: { type: string } }
        - { name: since, in: query, schema: { type: string, format: date-time } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/DistrictActivity" }

  /dashboards/sentiment/by-district:
    get:
      tags: [dashboards]
      summary: Тональность сообщений по районам
      parameters:
        - { name: since, in: query, schema: { type: string, format: date-time } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/DistrictSentiment" }

  /dashboards/model-quality:
    get:
      tags: [dashboards]
      summary: Поведение модели во времени (MAE deviation)
      parameters:
        - { name: model_version, in: query, schema: { type: string } }
        - { name: since,         in: query, schema: { type: string, format: date-time } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TimeSeries" }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  responses:
    Unauthorized:
      description: Unauthorized
      content:
        application/problem+json:
          schema: { $ref: "#/components/schemas/Problem" }
    NotFound:
      description: Not found
      content:
        application/problem+json:
          schema: { $ref: "#/components/schemas/Problem" }

  schemas:
    Problem:
      type: object
      properties:
        type:     { type: string }
        title:    { type: string }
        status:   { type: integer }
        detail:   { type: string }
        instance: { type: string }

    CursorPage:
      type: object
      properties:
        items:       { type: array, items: {} }
        next_cursor: { type: string, nullable: true }

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:    { type: string, format: email }
        password: { type: string }

    LoginResponse:
      type: object
      properties:
        token: { type: string }
        user:  { $ref: "#/components/schemas/User" }

    User:
      type: object
      properties:
        id:           { type: string, format: uuid }
        email:        { type: string, format: email }
        display_name: { type: string }
        role:         { type: string, enum: [user, admin] }

    Source:
      type: object
      properties:
        id:                { type: string, format: uuid }
        kind:              { type: string, enum: [tg, news, rss, html, realestate_site] }
        name:              { type: string }
        url_or_handle:     { type: string }
        enabled:           { type: boolean }
        poll_interval_sec: { type: integer }
        last_polled_at:    { type: string, format: date-time, nullable: true }

    SourceCreate:
      type: object
      required: [kind, name, url_or_handle]
      properties:
        kind:              { type: string }
        name:              { type: string }
        url_or_handle:     { type: string }
        poll_interval_sec: { type: integer, default: 300 }
        config:            { type: object }

    SourcePatch:
      type: object
      properties:
        name:              { type: string }
        enabled:           { type: boolean }
        poll_interval_sec: { type: integer }
        config:            { type: object }

    MessageWithAnnotation:
      type: object
      properties:
        id:           { type: string, description: "Mongo _id (hex)" }
        source_id:    { type: string, format: uuid }
        channel_kind: { type: string }
        channel_site: { type: string }
        url:          { type: string, nullable: true }
        author:       { type: object }
        published_at: { type: string, format: date-time }
        text:         { type: string }
        lang:         { type: string }
        annotation:
          type: object
          nullable: true
          properties:
            is_ad:     { type: boolean }
            ad_score:  { type: number }
            topics:    { type: array, items: { type: object, properties: { slug: { type: string }, score: { type: number } } } }
            sentiment: { type: object, properties: { label: { type: string }, score: { type: number } } }
            entities:  { type: array, items: { type: object } }

    ObjectWithEvaluation:
      type: object
      properties:
        id:            { type: string, description: "Mongo _id (hex)" }
        source_id:     { type: string, format: uuid }
        object_kind:   { type: string }
        channel_site:  { type: string }
        url:           { type: string }
        published_at:  { type: string, format: date-time }
        listing:       { type: object }
        status:        { type: string }
        evaluation:
          type: object
          nullable: true
          properties:
            model_version:   { type: string }
            predicted_price: { type: number }
            deviation_abs:   { type: number }
            deviation_pct:   { type: number }
            is_undervalued:  { type: boolean }
            rank_in_run:     { type: integer }
            computed_at:     { type: string, format: date-time }

    PricePoint:
      type: object
      properties:
        observed_at: { type: string, format: date-time }
        price:       { type: number }

    ModelRun:
      type: object
      properties:
        id:               { type: string, format: uuid }
        module:           { type: string }
        model_id:         { type: string, format: uuid }
        status:           { type: string }
        started_at:       { type: string, format: date-time, nullable: true }
        finished_at:      { type: string, format: date-time, nullable: true }
        items_processed:  { type: integer }

    ModelRunDetail:
      allOf:
        - $ref: "#/components/schemas/ModelRun"
        - type: object
          properties:
            result_ref: { type: object }
            error:      { type: string, nullable: true }

    ModelRunCreate:
      type: object
      required: [module]
      properties:
        module:           { type: string }
        model_id:         { type: string, format: uuid }
        module_config_id: { type: string, format: uuid }

    JobAccepted:
      type: object
      properties:
        job_id:     { type: string, format: uuid }
        status_url: { type: string }

    Job:
      type: object
      properties:
        id:          { type: string, format: uuid }
        kind:        { type: string }
        status:      { type: string, enum: [pending, running, succeeded, failed] }
        started_at:  { type: string, format: date-time, nullable: true }
        finished_at: { type: string, format: date-time, nullable: true }
        progress:    { type: number, nullable: true, description: "0..1, опц." }
        result:      { type: object, nullable: true }
        error:       { type: string, nullable: true }

    Subscription:
      type: object
      properties:
        id:          { type: string, format: uuid }
        target_kind: { type: string, enum: [source, topic, object] }
        target_ref:  { type: string }
        notify:      { type: boolean }
        created_at:  { type: string, format: date-time }

    SubscriptionCreate:
      type: object
      required: [target_kind, target_ref]
      properties:
        target_kind: { type: string, enum: [source, topic, object] }
        target_ref:  { type: string }
        notify:      { type: boolean, default: false }

    TimeSeries:
      type: object
      properties:
        granularity: { type: string }
        series:
          type: array
          items:
            type: object
            properties:
              t: { type: string, format: date-time }
              v: { type: number }

    DistrictActivity:
      type: object
      properties:
        district_slug:           { type: string }
        listings_new:            { type: integer }
        undervalued_count:       { type: integer }
        avg_undervaluation_pct:  { type: number }

    DistrictSentiment:
      type: object
      properties:
        district_slug:    { type: string }
        messages_total:   { type: integer }
        pos_count:        { type: integer }
        neu_count:        { type: integer }
        neg_count:        { type: integer }
        sentiment_avg:    { type: number }
